<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Lite | Digital Storefront</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #2ecc71;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 100px;
        }

        /* App-like Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        /* Category Navbar */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            white-space: nowrap;
        }

        .cat-item {
            background: var(--card-bg);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #333;
        }

        /* Menu Section */
        .container { padding: 15px; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .details { padding: 12px; }
        .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 5px; }
        .price { color: var(--primary); font-weight: bold; }

        /* Floating Action Buttons */
        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 2000;
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-call { background: var(--accent); }
        .btn-wa { background: var(--primary); }

    </style>
</head>
<body>

    <header>
        <h1>PIZZA LITE</h1>
    </header>

    <div class="categories">
        <div class="cat-item">🔥 Bestsellers</div>
        <div class="cat-item">🍕 Pizzas</div>
        <div class="cat-item">🍔 Burgers</div>
        <div class="cat-item">🥤 Shakes</div>
    </div>

    <div class="container">
        <div class="menu-grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza">
                <div class="details">
                    <div class="item-name">Margherita</div>
                    <div class="price">₹199</div>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Burger">
                <div class="details">
                    <div class="item-name">Veg Cheese Burger</div>
                    <div class="price">₹129</div>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <a href="tel:+91XXXXXXXXXX" class="btn btn-call">📞 Call Now</a>
        <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want to order..." class="btn btn-wa">💬 WhatsApp</a>
    </div>

</body>
</html>
